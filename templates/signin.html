<div class="modal fade" id="signinModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-sign-in-alt me-2"></i> Sign In</h5>
        <button type="button" class="btn-close" data-dismiss="modal" aria-label="Close" style="background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <form action="/signin" method="post">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="signinUsername" placeholder="Enter your username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="signinPassword" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary">Sign In</button>
          <p style="text-align:center;margin-top:1rem;font-size:13px;color:#6b7280;">
            Don't have an account?
            <a href="#" style="color:#7c3aed;font-weight:600;" data-dismiss="modal" data-toggle="modal" data-target="#signupModal">Sign Up</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>
