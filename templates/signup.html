<div class="modal fade" id="signupModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i> Create Account</h5>
        <button type="button" class="btn-close" data-dismiss="modal" aria-label="Close" style="background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <form action="/signup" method="post">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" placeholder="Choose a username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" placeholder="your@email.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" placeholder="At least 8 characters" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" name="repassword" placeholder="Repeat your password" required>
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
          <p style="text-align:center;margin-top:1rem;font-size:13px;color:#6b7280;">
            Already have an account?
            <a href="#" style="color:#7c3aed;font-weight:600;" data-dismiss="modal" data-toggle="modal" data-target="#signinModal">Sign In</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>
