<style>
.updates-panel {
  background: #1a1728;
  border: 1px solid rgba(139,92,246,0.25);
  border-radius: 12px;
  padding: 1.25rem;
  width: 300px;
  flex-shrink: 0;
}
.updates-panel h4 {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #8b5cf6;
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 7px;
}
.update-item {
  background: #221e35;
  border: 1px solid rgba(139,92,246,0.15);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 12.5px;
  color: #c4b5fd;
  line-height: 1.5;
}
.update-item strong { color: #e2d9f3; }
.updates-divider { height: 1px; background: rgba(139,92,246,0.15); margin: 12px 0; }
</style>

<div class="updates-panel">
  <h4><i class="fas fa-bolt"></i> New Purchases</h4>
  {% for x in newpurchase %}
  <div class="update-item">
    <strong>{{ x.productname }}</strong><br>
    Qty: {{ x.quantity }} &nbsp;·&nbsp; Rs {{ x.productprice }}<br>
    <span style="color:#6b7280;font-size:11px;">{{ x.purchaseTime }}</span>
  </div>
  {% else %}
  <div class="update-item" style="color:#6b7280;">No recent purchases</div>
  {% endfor %}

  <div class="updates-divider"></div>

  <h4><i class="fas fa-user-plus"></i> New Users</h4>
  {% for x in newuser %}
  <div class="update-item">
    <strong>{{ x.username }}</strong><br>
    <span style="color:#6b7280;font-size:11px;">{{ x.email }}</span>
  </div>
  {% else %}
  <div class="update-item" style="color:#6b7280;">No new users</div>
  {% endfor %}
</div>
