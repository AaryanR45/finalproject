<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Category — Admin</title>
  <style>
    .admin-main { flex: 1; padding: 2rem; }
    .page-head { margin-bottom: 1.5rem; }
    .page-head h1 { font-size: 1.5rem; font-weight: 800; color: #e2d9f3; }
    .form-card { background: #1a1728; border: 1px solid rgba(139,92,246,0.2); border-radius: 16px; padding: 2rem; max-width: 480px; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; background: #221e35; border: 1px solid rgba(139,92,246,0.25); border-radius: 8px; color: #e2d9f3; font-size: 14px; outline: none; }
    .form-group input:focus { border-color: #8b5cf6; }
    .btn-submit { padding: 11px 24px; background: #8b5cf6; color: #fff; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; }
    .btn-submit:hover { background: #7c3aed; }
  </style>
</head>
<body>
{% include './admin/adminheader.html' %}
<div class="admin-shell">
  {% include './admin/adminsidebar.html' %}
  <div class="admin-main">
    <div class="page-head"><h1><i class="fas fa-folder-plus"></i> Add Category</h1></div>
    <div class="form-card">
      <form action="/insertcategory" method="post">
        <div class="form-group">
          <label>Category Name</label>
          <input type="text" name="name" placeholder="e.g. Swimming" required>
        </div>
        <button type="submit" class="btn-submit"><i class="fas fa-plus"></i> Add Category</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
