<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Categories — Admin</title>
  <style>
    .admin-main { flex: 1; padding: 2rem; }
    .page-head { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .page-head h1 { font-size: 1.5rem; font-weight: 800; color: #e2d9f3; }
    .btn-add { padding: 9px 18px; background: #8b5cf6; color: #fff; border: none; border-radius: 9px; font-weight: 700; font-size: 13px; text-decoration: none; }
    .btn-add:hover { background: #7c3aed; color:#fff; text-decoration:none; }
    .cat-table { background: #1a1728; border: 1px solid rgba(139,92,246,0.2); border-radius: 14px; overflow: hidden; }
    .cat-table table { width: 100%; border-collapse: collapse; }
    .cat-table th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #8b5cf6; background: rgba(139,92,246,0.08); border-bottom: 1px solid rgba(139,92,246,0.15); }
    .cat-table td { padding: 13px 16px; font-size: 13.5px; color: #c4b5fd; border-bottom: 1px solid rgba(139,92,246,0.08); }
    .cat-table tr:last-child td { border-bottom: none; }
    .btn-del { padding: 6px 14px; background: rgba(244,63,94,0.1); color: #f87171; border: 1px solid rgba(244,63,94,0.25); border-radius: 7px; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-del:hover { background: rgba(244,63,94,0.3); color: #fff; }
  </style>
</head>
<body>
{% include './admin/adminheader.html' %}
<div class="admin-shell">
  {% include './admin/adminsidebar.html' %}
  <div class="admin-main">
    <div class="page-head">
      <h1><i class="fas fa-folder"></i> Categories</h1>
      <a href="/addcategory" class="btn-add"><i class="fas fa-plus"></i> Add Category</a>
    </div>
    <div class="cat-table">
      <table>
        <thead><tr><th>ID</th><th>Category Name</th><th>Action</th></tr></thead>
        <tbody>
          {% if result %}
            {% for cat in result %}
            <tr>
              <td style="color:#6b7280">{{ loop.index }}</td>
              <td style="color:#e2d9f3;font-weight:600">{{ cat.Categories }}</td>
              <td>
                <form action="/deletecategory" method="post" style="margin:0">
                  <input type="hidden" name="productid" value="{{ cat.id }}">
                  <input type="hidden" name="productname" value="{{ cat.Categories }}">
                  <button type="submit" class="btn-del"><i class="fas fa-trash"></i> Delete</button>
                </form>
              </td>
            </tr>
            {% endfor %}
          {% else %}
          <tr><td colspan="3" style="text-align:center;padding:2rem;color:#6b7280">No categories yet</td></tr>
          {% endif %}
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
