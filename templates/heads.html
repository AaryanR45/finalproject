<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>
:root {
  --primary: #0A1F44;
  --primary-dark: #071730;
  --primary-light: #e6ecf7;
  --accent: #f43f5e;
  --accent-dark: #be123c;
  --bg: #f8f7ff;
  --surface: #ffffff;
  --text: #1e1b2e;
  --muted: #6b7280;
  --border: #e5e7eb;
  --radius: 10px;
  --shadow: 0 4px 20px rgba(10,31,68,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Navbar ── */
.psg-nav {
  background: #071730;
  padding: 0 2rem;
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 4px 18px rgba(0,0,0,0.18);
}

.psg-nav .brand {
  font-size: 1.25rem;
  font-weight: 700;
  color: #fff;
  text-decoration: none;
  letter-spacing: -0.3px;
  white-space: nowrap;
}

.psg-nav .brand:hover {
  color: #dbeafe;
  text-decoration: none;
}

.psg-nav .brand span {
  color: #f9a8d4;
}

.psg-search {
  flex: 1;
  max-width: 440px;
  margin: 0 2rem;
  position: relative;
}

.psg-search form {
  display: flex;
}

.psg-search input {
  flex: 1;
  padding: 9px 14px;
  border-radius: 8px 0 0 8px;
  border: none;
  font-size: 14px;
  outline: none;
  background: rgba(255,255,255,0.15);
  color: #fff;
  transition: background 0.2s;
}

.psg-search input::placeholder {
  color: rgba(255,255,255,0.6);
}

.psg-search input:focus {
  background: rgba(255,255,255,0.25);
}

.psg-search button {
  background: var(--accent);
  border: none;
  color: #fff;
  padding: 9px 16px;
  border-radius: 0 8px 8px 0;
  cursor: pointer;
  transition: background 0.2s;
}

.psg-search button:hover {
  background: var(--accent-dark);
}

#suggestions {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  z-index: 2000;
  max-height: 280px;
  overflow-y: auto;
  display: none;
}

.suggestion-item {
  padding: 10px 14px;
  font-size: 13.5px;
  cursor: pointer;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.suggestion-item:last-child {
  border-bottom: none;
}

.suggestion-item:hover {
  background: var(--primary-light);
  color: var(--primary);
}

.psg-nav-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}

.psg-nav-actions .nav-cart {
  color: #fff;
  font-size: 1.1rem;
  position: relative;
  padding: 6px 8px;
  border-radius: 8px;
  transition: background 0.2s;
  text-decoration: none;
}

.psg-nav-actions .nav-cart:hover {
  background: rgba(255,255,255,0.15);
}

.psg-nav-actions .nav-username {
  color: #dbeafe;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 8px;
  transition: background 0.2s;
  text-decoration: none;
}

.psg-nav-actions .nav-username:hover {
  background: rgba(255,255,255,0.15);
}

.psg-nav-actions .nav-username i {
  font-size: 0.95rem;
}

.nav-btn {
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  border: none;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.nav-btn-signup {
  background: var(--accent);
  color: #fff;
}

.nav-btn-signup:hover {
  background: var(--accent-dark);
  color: #fff;
  text-decoration: none;
}

.nav-btn-signin {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
}

.nav-btn-signin:hover {
  background: rgba(255,255,255,0.28);
  color: #fff;
  text-decoration: none;
}

.nav-btn-logout {
  background: rgba(244,63,94,0.15);
  color: #fda4af;
  border: 1px solid rgba(244,63,94,0.3);
}

.nav-btn-logout:hover {
  background: rgba(244,63,94,0.3);
  color: #fff;
  text-decoration: none;
}

/* ── Modal overrides ── */
.modal-content {
  border-radius: 16px;
  border: none;
  box-shadow: 0 24px 60px rgba(0,0,0,0.15);
  overflow: hidden;
}

.modal-header {
  background: var(--primary);
  color: #fff;
  border-bottom: none;
  padding: 1.25rem 1.5rem;
}

.modal-title {
  font-weight: 700;
  font-size: 1.1rem;
}

.btn-close {
  color: #fff;
  opacity: 0.8;
}

.modal-body {
  padding: 1.75rem;
}

.modal-body .form-control {
  border-radius: 8px;
  border: 1px solid var(--border);
  padding: 10px 14px;
  font-size: 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.modal-body .form-control:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(10,31,68,0.1);
}

.modal-body .form-label {
  font-weight: 600;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 4px;
}

.modal-body .btn-primary {
  background: var(--primary);
  border: none;
  border-radius: 8px;
  padding: 10px 24px;
  font-weight: 600;
  width: 100%;
  margin-top: 4px;
}

.modal-body .btn-primary:hover {
  background: var(--primary-dark);
}
</style>

{% include 'signin.html' %}
{% include 'signup.html' %}

<nav class="psg-nav">
  <a class="brand" href="/index">PowerPlay</a>

  <div class="psg-search">
    <form action="/search" method="GET">
      <input type="search"
             name="query"
             placeholder="Search products..."
             id="searchBar"
             oninput="showSuggestions()"
             autocomplete="off">

      <button type="submit">
        <i class="fas fa-search"></i>
      </button>
    </form>

    <div id="suggestions"></div>
  </div>

  <div class="psg-nav-actions">
    <a class="nav-cart" href="/cart" title="Cart">
      <i class="fas fa-shopping-cart"></i>
    </a>

    {% if session.get('logged_in') %}
      <a class="nav-username" href="/detail">
        <i class="fas fa-user-circle"></i>
        {{ session['username'] }}
      </a>

      <a class="nav-btn nav-btn-logout" href="/logout">
        Logout
      </a>
    {% else %}
      <a class="nav-btn nav-btn-signup"
         href="#"
         data-toggle="modal"
         data-target="#signupModal">
         Sign Up
      </a>

      <a class="nav-btn nav-btn-signin"
         href="#"
         data-toggle="modal"
         data-target="#signinModal">
         Sign In
      </a>
    {% endif %}
  </div>
</nav>

<script>
function showSuggestions() {
  var query = document.getElementById('searchBar').value;

  if (query.length >= 1) {
    fetch(`/suggestions?query=${encodeURIComponent(query)}`)
      .then(r => r.json())
      .then(data => {
        let box = document.getElementById('suggestions');
        box.innerHTML = '';

        if (data.suggestions && data.suggestions.length > 0) {
          data.suggestions.forEach(s => {
            let d = document.createElement('div');

            d.className = 'suggestion-item';
            d.textContent = s;

            d.onclick = () => {
              document.getElementById('searchBar').value = s;
              box.style.display = 'none';
            };

            box.appendChild(d);
          });

          box.style.display = 'block';
        } else {
          box.style.display = 'none';
        }
      })
      .catch(() => {});
  } else {
    document.getElementById('suggestions').style.display = 'none';
  }
}

document.addEventListener('click', e => {
  if (!e.target.closest('.psg-search')) {
    document.getElementById('suggestions').style.display = 'none';
  }
});
</script>
