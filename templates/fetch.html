<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products</title>
</head>
<body>
{% include 'heads.html' %}

<style>
.page-layout { display: flex; max-width: 1300px; margin: 0 auto; padding: 1.5rem; gap: 1.5rem; }
.sidebar-cats {
  width: 180px; flex-shrink: 0;
  background: #fff; border-radius: 14px;
  border: 1px solid #ede9fe;
  padding: 1.25rem;
  height: fit-content;
  position: sticky; top: 80px;
}
.sidebar-cats h5 {
  font-size: 13px; font-weight: 700; color: #7c3aed;
  text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: 1rem;
}
.sidebar-cats form { display: flex; flex-direction: column; gap: 6px; }
.sidebar-cats button {
  width: 100%; text-align: left;
  padding: 8px 12px; border-radius: 8px;
  border: 1px solid #ede9fe; background: #fff;
  color: #1e1b2e; font-size: 13.5px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.sidebar-cats button:hover {
  background: #7c3aed; color: #fff; border-color: #7c3aed;
}
.products-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 18px;
}
.pcard {
  background: #fff; border-radius: 14px; overflow: hidden;
  border: 1px solid #ede9fe;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer; display: flex; flex-direction: column;
}
.pcard:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(124,58,237,0.12); }
.pcard img { width: 100%; height: 190px; object-fit: cover; border-bottom: 2px solid #ede9fe; }
.pcard-body { padding: 13px 15px; flex: 1; display: flex; flex-direction: column; }
.pcard-brand { font-size: 11.5px; color: #7c3aed; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.pcard-name { font-weight: 700; font-size: 13.5px; color: #1e1b2e; margin-bottom: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.pcard-price { font-size: 15px; font-weight: 800; color: #1e1b2e; margin-top: auto; margin-bottom: 10px; }
.btn-cart {
  width: 100%; padding: 8px;
  background: #f43f5e; color: #fff; border: none;
  border-radius: 8px; font-weight: 700; font-size: 13px;
  cursor: pointer; transition: background 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-cart:hover { background: #be123c; }
</style>

<div class="page-layout">
  {% include 'categorybutton.html' %}
  <div class="products-grid">
    {% for product in data %}
    <div class="pcard" onclick="window.location.href='{{ url_for('product_detail', pid=product.pid) }}'">
      <img src="{{ product['imageurl'].split('|')[0].strip() }}"
           alt="{{ product.pname }}"
           onerror="this.src='{{ (product['imageurl'].split('|')[1].strip() if '|' in product['imageurl'] else '') }}'">
      <div class="pcard-body">
        <div class="pcard-brand">{{ product.brand }}</div>
        <div class="pcard-name">{{ product.pname }}</div>
        <div class="pcard-price">Rs {{ product.price }}</div>
        <form action="/cart" method="post" onclick="event.stopPropagation()">
          <input type="hidden" name="pid" value="{{ product.pid }}">
          <input type="hidden" name="pname" value="{{ product.pname }}">
          <input type="hidden" name="image" value="{{ product['imageurl'].split('|')[0].strip() }}">
          <input type="hidden" name="price" value="{{ product.price }}">
          <button type="submit" class="btn-cart"><i class="fas fa-shopping-cart"></i> Add to Cart</button>
        </form>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

{% include 'foots.html' %}
</body>
</html>
